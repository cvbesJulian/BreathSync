<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BreathSync MIDI Setup</title>
  <link rel="stylesheet" href="midi-permission.css" />
</head>
<body>
  <main class="midi-permission">
    <div class="brand-lockup" aria-label="CVBES Labs">
      <span class="brand-logo" aria-hidden="true"></span>
      <p class="eyebrow">BreathSync</p>
    </div>
    <h1>MIDI setup</h1>
    <p class="intro">
      Enable Chrome MIDI access, then choose your output.
    </p>

    <label class="mode-control">
      <input id="darkModeToggle" type="checkbox" />
      <span>Dark mode</span>
    </label>

    <button id="enableMidi" type="button">Enable MIDI access</button>

    <label for="midiOutput">MIDI output</label>
    <select id="midiOutput">
      <option value="">Select IAC MIDI Driver</option>
    </select>

    <div class="actions">
      <button id="scanMidi" class="secondary" type="button">Scan MIDI outputs</button>
      <button id="testMidi" class="secondary" type="button">Test MIDI note</button>
      <button id="openSettings" class="secondary" type="button">Open Chrome MIDI settings</button>
    </div>

    <p id="midiStatus" class="status">MIDI not enabled yet.</p>
    <p id="midiDebug" class="debug">Outputs: press Enable MIDI access to scan</p>

    <footer class="signature" aria-label="Application signature">
      <span>Developed by CVBES Labs 2026</span>
      <span>Web v2.0.0</span>
    </footer>
  </main>

  <script src="chrome-shim.js"></script>
  <script src="midi-permission.js"></script>
</body>
</html>
